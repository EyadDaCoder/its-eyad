    <body>
        <div class="dennis_goober_william">
        <h1>william the goober</h1>
        <br>
        <p>this is wiliam the goober. we don't know where he came from. we only know his last name.</p>
        <br>
        <button onclick="petGoober()" type="button">pet</button>
        <img id="goober" src="../server/images/dennis_william.png" alt="dennis william the goober" title="william the goober" width = 200>
        <button onclick="feedGoober()" type="button">feed</button>
        </div>
        <script>
            function petGoober() {
                const img = document.getElementById("goober");

                img.src = "../server/images/william_pet.gif";

                setTimeout(() => {
                    img.src = "../server/images/dennis_william.png";
                }, 2000);
            }
            
            function feedGoober() {
                const img = document.getElementById("goober");

                img.src = "../server/images/william_eat.gif?";

                setTimeout(() => {
                    img.src = "../server/images/dennis_william.png";
                }, 3000);
            }
        </script>
